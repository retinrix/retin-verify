# Classification Model Configuration - EfficientNet-B0

model:
  name: "efficientnet_b0"
  num_classes: 2
  class_names: ["cnie_front", "cnie_back"]
  pretrained: true
  dropout: 0.3

training:
  batch_size: 32
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.01
  optimizer: "adamw"
  scheduler: "cosine"
  warmup_epochs: 5
  early_stopping_patience: 10
  
data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  input_size: 224
  num_workers: 4
  augment: true
  
augmentation:
  random_crop: true
  random_flip: true
  random_rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.05

checkpointing:
  save_every: 10
  keep_best: true
  keep_last: true
  output_dir: "training/classification/checkpoints"

logging:
  use_tensorboard: true
  log_every: 10
  log_dir: "training/classification/logs"

performance_targets:
  accuracy: 0.99
  max_latency_ms: 50
